<!DOCTYPE html>

<html>

<head>

<title>

Flood Prediction

</title>

<link rel="stylesheet"

href="{{ url_for('static',

filename='main.css') }}">

</head>

<body>

<nav>

<h1>

Floods Prediction

</h1>

<ul>

<li>

<a href="/">

Home

</a>

</li>

</ul>

</nav>


<div class="container">

<form action="/prediction"

method="POST">


<input type="number"

step="any"

name="temp"

placeholder="Temperature"

required>


<input type="number"

step="any"

name="humidity"

placeholder="Humidity"

required>


<input type="number"

step="any"

name="cloud"

placeholder="Cloud Cover"

required>


<input type="number"

step="any"

name="annual"

placeholder="Annual Rainfall"

required>


<input type="number"

step="any"

name="jan"

placeholder="Jan-Feb Rainfall"

required>


<input type="number"

step="any"

name="march"

placeholder="Mar-May Rainfall"

required>


<input type="number"

step="any"

name="june"

placeholder="Jun-Sep Rainfall"

required>


<input type="number"

step="any"

name="oct"

placeholder="Oct-Dec Rainfall"

required>


<input type="number"

step="any"

name="avgjune"

placeholder="Average June"

required>


<input type="number"

step="any"

name="sub"

placeholder="Subdivision"

required>


<button class="predict-btn">

Predict

</button>

</form>

</div>

</html>
